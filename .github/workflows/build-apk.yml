name: بناء تطبيق APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: بناء ملف التطبيق
    runs-on: ubuntu-latest

    steps:
      - name: جلب الكود
        uses: actions/checkout@v4

      - name: إعداد بيئة فلاتر
        uses: subosito/flutter-action@v5
        with:
          flutter-version: 'stable'
          cache: true

      - name: تحميل المكتبات
        run: flutter pub get

      - name: بناء ملف APK
        run: flutter build apk --release --no-shrink

      - name: رفع الملف الجاهز
        uses: actions/upload-artifact@v4
        with:
          name: الماسح_الذكي_APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
