name: smart_ocr_pro
description: تطبيق استخراج النصوص من الصور وملفات PDF بدقة عالية يدعم العربية والإنجليزية
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_mlkit_text_recognition: ^0.14.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  share_plus: ^10.0.0
  file_picker: ^8.1.2
  pdf_image_renderer: ^0.8.0
  path_provider: ^2.1.4
  device_info_plus: ^9.1.0

flutter:
  uses-material-design: true
